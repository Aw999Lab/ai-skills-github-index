name: Refresh Skills Index

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"
    - cron: "17 14 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-skills-index
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh data and docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/refresh-all.js

      - name: Commit and push changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ai-skills-links.json data/discovery-config.json docs/ai-skills-github-index.md docs/skill-views.md README.md
          git commit -m "Refresh GitHub skills index"
          git push origin HEAD:main
